name: release

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test

  build:
    needs: check
    strategy:
      matrix:
        target:
          - { runner: macos-latest, target: bun-darwin-arm64, artifact: ctxbrew-darwin-arm64 }
          - { runner: macos-latest, target: bun-darwin-x64, artifact: ctxbrew-darwin-x64 }
          - { runner: ubuntu-latest, target: bun-linux-x64, artifact: ctxbrew-linux-x64 }
          - { runner: ubuntu-latest, target: bun-linux-arm64, artifact: ctxbrew-linux-arm64 }
          - { runner: windows-latest, target: bun-windows-x64, artifact: ctxbrew-windows-x64.exe }
    runs-on: ${{ matrix.target.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun build --compile --target=${{ matrix.target.target }} ./src/bin/ctxbrew.ts --outfile dist/${{ matrix.target.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target.artifact }}
          path: dist/${{ matrix.target.artifact }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten artifacts
        run: |
          mkdir -p out
          find dist -type f -exec cp {} out/ \;
          rm -rf dist
          mv out dist
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
