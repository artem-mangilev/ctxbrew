name: release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: release
    # macos-latest lets `codesign --sign -` (ad-hoc) work for darwin binaries;
    # Bun cross-compiles the linux/windows targets from the same host.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for semantic-release)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build binaries
        run: bun run build

      - name: Verify artifacts
        run: |
          set -eu
          for f in \
            dist/ctxb-darwin-arm64 \
            dist/ctxb-darwin-x64 \
            dist/ctxb-linux-x64 \
            dist/ctxb-linux-arm64 \
            dist/ctxb-windows-x64.exe; do
            test -s "$f" || { echo "missing or empty: $f" >&2; exit 1; }
          done
          ls -lh dist

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # semantic-release reads NPM_TOKEN; npm CLI reads NODE_AUTH_TOKEN.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx --yes semantic-release
